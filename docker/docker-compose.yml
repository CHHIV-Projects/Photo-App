services:
  postgres:
    image: postgres:16
    container_name: photo-organizer-postgres
    restart: unless-stopped
    environment:
      # Replace these placeholder values later with your real local settings.
      POSTGRES_DB: photo_organizer
      POSTGRES_USER: photo_user
      POSTGRES_PASSWORD: change_me
    ports:
      # Host:Container
      - "5432:5432"
    volumes:
      # Keeps database data between container restarts.
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: photo-organizer-redis
    restart: unless-stopped
    ports:
      # Host:Container
      - "6379:6379"
    volumes:
      # Keeps Redis data between container restarts.
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
